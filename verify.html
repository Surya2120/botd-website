<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Verify a BOTD registration entry using the official registration ID.">
  <meta name="robots" content="noindex, nofollow">
  <title>Verify Registration | Battle Of The Dance</title>
  <link rel="icon" type="image/png" href="assets/images/logo/Final_BOTD_Logo.png">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/register.css">
</head>
<body class="register-page verify-page">
  <div class="site-shell">
    <header class="topbar" id="top">
      <div class="container nav-wrap">
        <a class="brand" href="index.html" aria-label="Battle Of The Dance home">
          <img class="theme-logo" src="assets/images/logo/Final_BOTD_Logo.png" alt="BOTD logo">
        </a>
        <nav class="nav" id="site-nav" aria-label="Primary navigation">
          <a class="nav-link" href="index.html">Home</a>
          <a class="nav-link" href="about.html">About BOTD</a>
          <a class="nav-link" href="seasons.html">Seasons</a>
          <a class="nav-link nav-accent" href="register.html">Register Now</a>
          <a class="nav-link" href="events.html">Events</a>
          <a class="nav-link" href="voting.html">Voting</a>
          <a class="nav-link" href="sponsors.html">Our Sponsors</a>
          <a class="nav-link" href="contact.html">Contact</a>
        </nav>
        <div class="nav-actions">
          <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle light and dark theme" aria-pressed="false">
            <span class="theme-toggle-track"><span class="theme-toggle-thumb"></span></span>
            <span class="theme-toggle-label">Light</span>
          </button>
          <button class="menu-toggle" id="menu-toggle" type="button" aria-label="Open menu" aria-expanded="false" aria-controls="site-nav">
            <span></span>
            <span></span>
            <span></span>
          </button>
        </div>
      </div>
    </header>

    <main>
      <section class="section verify-section">
        <div class="container">
          <div class="verify-card reveal is-visible" id="verify-card">
            <p class="eyebrow">BOTD Entry Verification</p>
            <h1>Verify Registration</h1>
            <p class="verify-status" id="verify-status">Checking registration...</p>

            <div class="verify-result" id="verify-result" hidden>
              <div class="verify-badge" id="verify-badge">ENTRY CONFIRMED</div>
              <dl class="verify-details">
                <div>
                  <dt>Name</dt>
                  <dd id="verify-name">-</dd>
                </div>
                <div>
                  <dt>Category</dt>
                  <dd id="verify-category">-</dd>
                </div>
                <div>
                  <dt>Payment Status</dt>
                  <dd id="verify-payment-status">-</dd>
                </div>
                <div>
                  <dt>Registration ID</dt>
                  <dd id="verify-registration-id">-</dd>
                </div>
              </dl>
            </div>

            <a class="button button-primary" href="register.html">Back to Registration</a>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="js/payment-config.js"></script>
  <script type="module" src="js/script.js"></script>
  <script type="module" src="js/verify.js"></script>
</body>
</html>
